l_korean:
 from_the_ashes_site_desc: "극도로 뜨겁고 생명체에 적대적인 [Planet.GetName]의 표면에서 확인된 인공적인 폐허가 [Owner.GetScientistPlural]의 관심을 끌었습니다. 고고학 조사를 통해 이곳에 누가 있었는지, 그리고 무슨 일이 일어났는지 밝혀낼 수 있을 것입니다."
 infernals.2700.desc: "[From.Planet.GetName]의 폐허는 처음에는 돌로 지어진 것처럼 보였지만, 발굴 및 분석 결과 이 잊힌 도시의 많은 구조물이 나무와 유사한 석화된 유기물로 만들어진 것으로 나타났습니다. 오늘날 이 행성에서 이 유기물의 출처는 찾을 수 없습니다. 더 작은 유물은 조잡한 금속, 유리, 그리고 유사한 석화 유기물로 만들어졌으며, [Owner.GetScientistPlural]들은 더 이상 존재하지 않는 토착 생물의 화석도 발견했습니다.\n\n수수께끼의 문명은 기후가 훨씬 온화했던 시기에 이 행성에 거주했던 것으로 보입니다. 행성이 지금처럼 변하기 훨씬 전에 사라진 걸까요, 아니면 격변을 목도하며 최후를 맞이하게 된 걸까요?"
