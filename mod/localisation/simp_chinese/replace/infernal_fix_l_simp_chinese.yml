l_simp_chinese:
 from_the_ashes_site_desc: "[Planet.GetName]表面炙热，不适宜生物生存。行星上明显的人工遗迹影像引起了[Owner.GetScientistPlural]的注意。考古调查或可揭示这里的居民和曾发生在他们身上的故事。"
 infernals.2700.desc: "[From.Planet.GetName]遗迹初看似由石头构成，但挖掘和分析表明，许多建筑由石化的类木材有机物构成。现今行星上已无该材料来源。小型文物由粗制金属、玻璃及类似的石化有机物组成，[Owner.GetScientistPlural]还发现了已灭绝本土生物的化石。\n\n该文明疑居于气候温和时期。他们是早已消失，还是目睹了巨变的尾声？"
