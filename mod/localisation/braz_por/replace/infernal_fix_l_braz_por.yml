l_braz_por:
 from_the_ashes_site_desc: "A superfície de [Planet.GetName] é escaldante e hostil à vida biológica. Imagens de ruínas claramente artificiais chamaram, portanto, a atenção de [Owner.GetScientistPlural]. Uma investigação arqueológica pode revelar quem esteve aqui e o que aconteceu com eles."
 infernals.2700.desc: "Embora as ruínas em [From.Planet.GetName] inicialmente parecessem ser feitas de pedra, escavações e análises sugerem que muitas das estruturas desta cidade perdida são compostas de um material orgânico petrificado comparável à madeira. Atualmente, não existe nenhuma fonte desse tipo de material no planeta. Artefatos menores são feitos de metais brutos, vidro e outros orgânicos petrificados semelhantes, e [Owner.GetScientistPlural] também encontraram fósseis de criaturas nativas extintas.\n\nParece que a civilização em questão habitou o planeta em uma época em que seu clima era muito mais ameno. Será que eles desapareceram muito antes de o planeta assumir seu estado atual, ou testemunharam a transição violenta em seus anos finais?"
