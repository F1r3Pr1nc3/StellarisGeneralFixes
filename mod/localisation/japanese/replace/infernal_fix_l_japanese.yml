l_japanese:
 from_the_ashes_site_desc: "[Planet.GetName]の地表は灼熱に包まれ、 生物の生存を拒んでいる。 それにもかかわらず、 明らかに人工的な遺跡の映像が撮影され、[Owner.GetScientistPlural]の注目を集めた。 考古学的調査によって、 かつてここに存在した者たちと、 彼らに何が起きたのかが明らかになるかもしれない。"
 infernals.2700.desc: "[From.Planet.GetName]の遺跡は当初、石造りに見えた。 しかし発掘と分析の結果、 この失われた都市の多くの構造物は、 木材に似た有機物が石化したものであることが示唆されている。 現在この惑星には、 そうした素材の痕跡は存在しない。 小規模な遺物は粗製の金属やガラス、 同様に石化した有機生命体で作られており、[Owner.GetScientistPlural]はすでに絶滅した在来生物の化石も発見した。\n\nこの文明は、 この惑星の気候がはるかに温暖であった時代に栄えていたようだ。 彼らは惑星が現在の状態に変わるよりもはるか以前に姿を消したのか、 それとも最期の年月にこの激変を目の当たりにしたのだろうか？"
