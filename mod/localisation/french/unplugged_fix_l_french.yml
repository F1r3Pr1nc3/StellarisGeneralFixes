l_french:
 trait_unplugged_cybernetic_positives_3_desc: "Grâce à des prothèses complètes et à des armures corporelles en nanomaille collée, ces cyborgs peuvent mener la guerre avec une efficacité redoutable. En conséquence, plusieurs fonctions corporelles non militaires ont été sacrifiées."
 trait_unplugged_cybernetic_negatives_3_desc: "Plusieurs des améliorations apportées à ces cyborgs ont été conçues pour utiliser un réseau de champ de bataille qui n'existe plus, ce qui provoque un stress intense et un inconfort considérable."
