 ariphaos_patch.7201.name: "Pas de surprise"
 ariphaos_patch.7201.desc: "Les capteurs donnent des lectures étranges dans le système Seddom. Les mondes enveloppés restants semblent avoir été descellés comme les autres, et le système s'est installé dans son harmonie actuelle et souhaitée."
 ariphaos_patch.7201.option: "Cela ne finit jamais."
 progress.3.desc_gaia: "Notre vaisseau de colonie s'est doucement posé dans une grande vallée fluviale sur §Y[Root.GetName]§!. Chaque panorama est à couper le souffle, et les rapports faisant état de vues magnifiques submergent nos réseaux.\n\nLe vaisseau a été définitivement converti en siège administratif de la nouvelle colonie, et son coeur de réacteur est en train d'être retiré afin qu'il puisse servir de source d'énergie temporaire à la colonie.\n\nDes centaines de petites tentes et d'abris préfabriqués ont surgi autour de la coque massive de l'ancien vaisseau alors que les colons commencent à débarquer en grand nombre - la première ville [Root.Owner.GetSpeciesName] sur un monde extraterrestre."
 progress.3.desc_relic: "Notre vaisseau colonial s'est doucement posé sur une plate-forme relativement solide et vide de §Y[Root.GetName]§!. Bien que quelque chose qui ressemble à de la végétation ait commencé à reconquérir le monde, cela ne peut pas vraiment être considéré comme de la nourriture. Il existe cependant d’immenses réservoirs d’eau et les abris ne manquent pas.\n\nLe vaisseau est en train d'être cannibalisé pour étoffer un bâtiment sur la nouvelle colonie afin de servir de centre administratif, et son coeur de réacteur est en train d'être retiré afin qu'il puisse servir de source d'énergie temporaire à la colonie.\n\nDes centaines de sentiers ont été creusés dans les décombres autour de la coque massive de l'ancien vaisseau alors que les colons commencent à débarquer en grand nombre - la première ville [Root.Owner.GetSpeciesName] sur un monde extraterrestre."
 progress.3.desc_city: "Notre vaisseau de colonie a atterri sur l'une des innombrables plates-formes dédiées à cet effet sur §Y[Root.GetName]§!. Le vaste paysage urbain ne fournit rien pour la nutrition, mais des réservoirs colossaux fournissent un approvisionnement en eau immédiat.\n\nLe vaisseau est lentement cannibalisé, servant de siège administratif temporaire à la nouvelle colonie, alors que les colons commencent à explorer et à se diffuser dans la ville à l'échelle mondiale.\n\nDes centaines de bâtiments sont revendiqués par les colons débarquant du vaisseau pour remplir diverses fonctions - la première ville [Root.Owner.GetSpeciesName] sur un monde extraterrestre."
 progress.3.desc_nuked: "Notre vaisseau colonial s'est doucement posé dans une plaine relativement luxuriante sur §Y[Root.GetName]§!. Il y a une quantité raisonnable de végétation à proximité et une source d'eau relativement propre, même si elle passe par des filtres sur le navire pour éliminer d'abord les matières radioactives.\n\nLe vaisseau a été définitivement converti en siège administratif de la nouvelle colonie, et son coeur de réacteur est en train d'être retiré afin qu'il puisse servir de source d'énergie temporaire à la colonie.\n\nDes centaines de petites tentes et d'abris préfabriqués ont surgi autour de la coque massive de l'ancien vaisseau alors que les colons commencent à débarquer en grand nombre - la première ville [Root.Owner.GetSpeciesName] sur un monde extraterrestre."
 progress.3.desc_habitat: "Notre vaisseau de colonie s'est délicatement amarré à §Y[Root.GetName]§!. Les colons explorent soigneusement l'intérieur de l'habitat, sécurisent les ressources qui peuvent être trouvées et apprennent à exploiter les réserves d'eau de l'habitat.\n\nLe vaisseau est lentement cannibalisé de l'intérieur vers l'extérieur, un bâtiment de fortune près du sas colossal est transformé en siège administratif de la nouvelle colonie, et le coeur du réacteur du vaisseau est en train d'être retiré afin qu'il puisse servir de source d'énergie temporaire à la colonie.\n\nDes centaines d'abris et de tentes préfabriqués ont rempli les recoins de la structure alors que les colons commencent à débarquer en grand nombre - la première ville [Root.Owner.GetSpeciesName] sur une plateforme extraterrestre."
 progress.3.desc_ringworld: "Notre vaisseau colonial s'est posé doucement sur un relief plat approprié sur §Y[Root.GetName]§!. Chaque panorama est à couper le souffle, aussi artificiel soit-il, et les rapports faisant état de vues magnifiques submergent nos réseaux.\n\nLe vaisseau a été définitivement converti en siège administratif de la nouvelle colonie, et son coeur de réacteur est en train d'être retiré afin qu'il puisse servir de source d'énergie temporaire à la colonie.\n\nDes centaines de petites tentes et d'abris préfabriqués ont surgi autour de la coque massive de l'ancien vaisseau alors que les colons commencent à débarquer en grand nombre - la première ville de [Root.Owner.GetSpeciesName] sur un ringworld incroyablement vaste."
 progress.3.desc_other: "Notre vaisseau de colonie s'est doucement posé sur§Y[Root.GetName]§!. Le paysage extraterrestre est difficile, mais nos colons persévèrent.\n\nLe vaisseau a été définitivement converti en siège administratif de la nouvelle colonie, et son coeur de réacteur est en train d'être retiré afin qu'il puisse servir de source d'énergie temporaire à la colonie.\n\nDes centaines de petites tentes et d'abris préfabriqués ont surgi autour de la coque massive de l'ancien vaisseau alors que les colons commencent à débarquer en grand nombre - la première ville [Root.Owner.GetSpeciesName] sur un monde extraterrestre."
