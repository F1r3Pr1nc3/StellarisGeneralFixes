 personality_galactic_defense_force_desc: "Cet empire existe pour veiller sur la galaxie elle-même. Considérant la sécurité interstellaire comme une responsabilité collective, il maintient des flottes puissantes et des défenses avancées pour décourager les menaces existentielles. Bien que non agressif par nature, il n'hésitera pas à intervenir lorsque la stabilité galactique est menacée - par la diplomatie si possible, par la force si nécessaire."
