 crisis.7111.desc: "La curiosité est une qualité louable, mais son excès pourrait avoir des conséquences désastreuses pour nous tous. Pour votre bien, réfléchissez à vos actes.\n\nIl est encore temps d'arrêter, avant que la galaxie ne subisse des dommages irréversibles. Les forces que vous souhaitez manipuler ne sont pas des jouets, et vos expériences constituent une menace pour nous tous."
