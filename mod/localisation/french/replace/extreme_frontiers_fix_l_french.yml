 extreme_frontiers.250.desc: "L'analyse des rivières fluorescentes sur §Y[from.GetName]§! a révélé qu'elles abritent une espèce microbienne unique. \n\nGrâce à la chimiosynthèse, qui leur permet de métaboliser des composés nocifs, ces créatures génèrent des sous-produits hautement réactifs qui modifient la composition chimique de la rivière, provoquant des changements de couleur spectaculaires. \n\nServant également de moyen de communication, les teintes néon vives qu'elles créent sont utilisées pour signaler leur état de fertilité, attirant ainsi des partenaires alors qu'elles voyagent à travers les cours d'eau toxiques de la planète.\n\nLa poursuite de l'étude de ces créatures et de leur cycle de vie offrira une opportunité de recherche fascinante pour notre [Root.controller.GetResearcherPlural_lower]."
