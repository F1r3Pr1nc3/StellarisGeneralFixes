 astral_situation.55.desc: "$astral_rift_discovery_event_text$\n\nUne planète mystérieuse, que nous avons baptisée §Y[planet_rift_in_space.GetName]§!, est apparue là où il n'y avait rien auparavant. Nous n'avons aucune trace de son existence antérieure sur nos cartes stellaires.\n\nElle est peuplée par une civilisation [Owner.GetPreFTLLower].\n\nNotre meilleure hypothèse est qu'elle est arrivée d'une manière ou d'une autre de l'extérieur de notre univers."