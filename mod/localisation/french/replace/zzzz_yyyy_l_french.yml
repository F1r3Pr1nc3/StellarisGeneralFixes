l_french:
 first_league_homeworld_desc: "Ce mausolée planétaire était autrefois le centre administratif rayonnant de la Première Ligue. Il a connu de nombreuses vicissitudes au fil du temps, mais les ruines de la ville qui s'étendait autrefois sur toute la surface sont encore visibles partout."
 resolution_custodian_united_front_modifier_desc: "Dégâts infligés aux factions de crise: §G+20 %§!\nCrédits énergétiques mensuels: §R-3 %§!"
 resolution_rulesofwar_reverence_for_life_tooltip: "§YPurge§! (autre que Displacement) et l'utilisation de §YDestructeur de monde§! sont §Rbanned§!, sauf s'il s'agit d'un combat contre les §RCrises de faction§!."
 resolution_rulesofwar_independent_tribunals_tooltip: "Mener un bombardement §Yd'Armageddon§! ou §YSans distinction§!, ainsi qu'utiliser n'importe quelle arme de Colosse autre qu'un §YPacificateur mondial§! est §Rbanni§!, à moins qu'il ne s'agisse d'un combat contre des §RCrises de faction§!."
 resolution_rulesofwar_last_resort_doctrine_tooltip: "La philosophie de guerre §YGuerres sans restriction§! est §Rbannie§!.\nVitesse de construction des vaisseaux (§RCrises§! en cours) : §G+25%§!"
 resolution_rulesofwar_demobilization_initiative_tooltip: "La politique économique §YÉconomie militarisée§! est bannie, à moins qu'une §RCrises§! ne soit en cours.\nVitesse de construction des vaisseaux (§RCrises§! en cours) : §G+25%§!"
 sship_build_speed_mult_crisiss: "Les écrits sur le mur"
