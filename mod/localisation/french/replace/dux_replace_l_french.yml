l_french:
 leader_trait_supporting_voter_tt: "$t$- Le soutien à une résolution adoptée accorde 1 §YFaveur§! et 5 de §YConfiance§! à l'empire qui l'a proposée."
 observation.4.a.tt:0 "$regress_to_age_tt$"
 observation.1004.desc:0 "Le scientifique que nous avons initialement identifié sur [pre_ftl_planet.GetName] s'est révélé être un talent remarquable. Ses recherches non conventionnelles et son esprit d'analyse aiguisé ont rapidement accéléré le développement technologique de [pre_ftl_country.GetName]."
 observation.1205.desc:1 "Les [pre_ftl_country.GetSpeciesName] sur [pre_ftl_planet.GetName] ont mené leurs propres recherches sur les implants neuronaux que nous avons laissés derrière nous. D'une manière ou d'une autre, les chercheurs [GetPreFTLLower] ont réussi à concevoir des cybernétiques beaucoup plus compatibles avec la biologie de [pre_ftl_country.GetSpeciesName] qu’il ne nous a été possible."
 observation.3131.desc:1 "Nos tentatives de remplacer une figure clé sur [prelude_to_war_planet.GetName] par un sosies de nos propres rangs ont terriblement mal tourné. Nos agents ont été découverts et ceux qui n’ont pas été tués dans l'échange de tirs se sont suicidés pour éviter la capture, conformément aux instructions.\n\nLa personnalité que nous avions chargé de remplacer a blâmé cet incident sur une nation rivale. Les tensions internationales sur [prelude_to_war_planet.GetPlanetMoon] s’intensifient et plusieurs nations ont augmenté leur niveau de préparation militaire. Nos cellules d'infiltration ont préparé une campagne de propagande mondiale pour désamorcer la situation, mais elles auront besoin d'un vaisseau scientifique en orbite pour coordonner leurs efforts."
 fircon.1291.desc:0 "Malheureusement, comme les habitants de §Y[FromFromFrom.Owner.Capital.GetName]§! ne savaient pas qui était responsable de leurs nouvelles cartes stellaires, ils ont considéré nos efforts comme un simple vandalisme. La sécurité autour des grottes a augmenté et l'élite dirigeante est devenue hostile aux nouvelles formes d’expression personnelle...\n\nSur une note positive, notre interférence n'a pas été une perte de temps totale. Leur réaction à cet événement s'est avérée fascinante en termes de recherche culturelle."
 preftl.2049.desc:0 "Les circonstances changeantes et rapides sur [Target.GetName] ont rendu impossible la poursuite de notre surveillance de la peste en cours. Pour le moment, tous les projets de recherche sur la planète doivent être suspendus."
 fircon.1330.desc:0 "La société sur §Y[From.Owner.Capital.GetName]§! s’épanouit avec une culture riche et un profond attrait pour l'art. Les habitants déposent leurs armes au profit d’instruments d’écriture. Avec cette nouvelle volonté d’apprendre et d’explorer au-delà du conflit, nous pourrions être témoins de l'aube d'un âge d'or sur le [pre_ftl_planet.GetPlanetHabitat]."
 fircon.1390.desc:0 "En choisissant de laisser les chefs d'État de §Y[FromFrom.Owner.Capital.GetName]§! à leur propre sort, ils sont désormais entièrement responsables de leur destin. Malheureusement, il semble qu’ils soient en route vers la guerre.\n\nDes différences supposément irréconciliables ont incité les groupes culturels du [pre_ftl_planet.GetPlanetHabitat] à s'armer les uns contre les autres. Le conflit à venir représente une période sombre dans leur développement."
 fircon.1395.desc:0 "Les personnalités de §Y[FromFromFrom.Owner.Capital.GetName]§! ont suivi nos conseils et déposé leurs armes. Il est impossible de dire si la paix durera, mais pour l'instant au moins, ils ne sont pas susceptibles d’être effacés de la surface de leur [pre_ftl_planet.GetPlanetHabitat]."
 fircon.1400.desc:0 "Notre intervention a peut-être attisé le feu proverbial sur §Y[FromFromFrom.Owner.Capital.GetName]§!. Leur monde est maintenant en guerre. Cependant, s’ils échouent à s’éradiquer mutuellement, il pourrait y avoir un aspect positif à cette situation: les progrès technologiques réalisés sur [pre_ftl_planet.GetPlanetHabitat] sont remarquables.\n\nPeut-être que, lorsque et si la fumée des combats se dissipe, ils mettront certaines de ces technologies à bon usage."
 fircon.1445.desc:0 "Une guerre a éclaté sur §Y[From.Owner.Capital.GetName]§!. Ces dernières années, certaines factions sur [pre_ftl_planet.GetPlanetHabitat] ont réussi à accumuler suffisamment de richesses pour monopoliser les moyens de production. À leur tour, d’autres se sont révoltés contre la croissante inégalité. Une guerre des classes totale a maintenant éclaté. C'est une période sombre pour §Y[From.Owner.Capital.GetName]§!. Cela aura des conséquences durables."
 fircon.1455.desc:0 "Sur §Y[FromFromFrom.Owner.Capital.GetName]§!, les voix dissidentes ont été réduites au silence par l'élite puissante. Cependant, si nous intervenons maintenant, nous pourrions certainement renverser la tendance. Notre présence sur [pre_ftl_planet.GetPlanetHabitat] pourrait renforcer ce qui reste de la résistance."
 fircon.2011.avian.desc:0 "$fircon.2011.base.desc$\n\nLes spécimens ailés que nous essayions de capturer ont trouvé l'accident très amusant. Les spécimens les plus audacieux se sont même mis à courir après nos [GetIndividualNamePlural] dans le but d’être hissés en l’air, juste pour le frisson."
 fires_of_industry_desc:0 "Ce monde a été fortement pollué lors de la révolution industrielle locale."
 fircon.2545.desc:0 "Le proto-nid que nous observons sur [pre_ftl_planet.GetName] a franchi une étape importante dans son évolution. Sur la majeure partie du [pre_ftl_planet.GetPlanetHabitat], de petits groupes d'individus avaient commencé à s’organiser en nids à petite échelle, mais ces drones, bien que pas entièrement autonomes, manquaient jusqu'à présent de cohésion et de coordination d’un collectif pleinement réalisé.\n\nCela a changé dans les régions du nord du [pre_ftl_planet.GetPlanetHabitat], où un individu semble être le nœud d'une singularité qui asservit les drones voisins. Ce 'Drone-Premier' voyage actuellement sur le [pre_ftl_planet.GetPlanetHabitat] et envoie les drones asservis pour se regrouper dans un habitat de proportions massives compte tenu du faible niveau technologique de la planète. Là, les drones semblent se concentrer sur la construction de maisons, de silos et sur l’expansion de leur production alimentaire autant que possible afin d’accueillir les nouveaux arrivants. L'autonomie a disparu, pour eux, il n'y a plus qu'un collectif."