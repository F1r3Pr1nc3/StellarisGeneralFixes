l_french:
 from_the_ashes_site_desc: "La surface de [Planet.GetName] est brûlante et hostile à toute forme de vie biologique, c'est pourquoi les images de ruines manifestement artificielles ont attiré l'attention de nos [Owner.GetScientistPlural]. Des fouilles archéologiques nous permettraient de déterminer qui vivait ici et ce qui leur est arrivé."
 infernals.2700.desc: "Les ruines découvertes sur [From.Planet.GetName] semblaient à première vue faites de pierre, mais les fouilles et les analyses ont révélé que de nombreuses structures de cette ville perdue étaient faites d'une matière organique pétrifiée semblable au bois. Il n'existe aujourd'hui plus aucune source de cette matière sur la planète. Les artefacts plus petits sont faits de métaux bruts, de verre et de matières organiques pétrifiées similaires. Nos [Owner.GetScientistPlural] ont également découvert des fossiles de créatures indigènes aujourd'hui disparues.\n\nCette civilisation semble avoir existé à une époque où le climat était beaucoup plus clément. A-t-elle disparu bien avant que la planète n'atteigne son état actuel, ou a-t-elle été témoin de cette violente transition au cours de ses dernières années ?"
