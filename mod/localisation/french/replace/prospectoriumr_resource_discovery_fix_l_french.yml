l_french:
 ResourceDiscovery1: "Juste sous la surface de [This.GetName], nous avons découvert une structure délabrée, cachée par le passage du temps. Bien que sa charpente soit encore relativement intacte, l'intérieur du bâtiment ne contient rien qui vaille la peine d'être récupéré. Cependant, nous avons découvert un passage menant plus loin sous terre."
 ResourceDiscovery2: "Nous avons trouvé un groupe de machines plus petites et désorientées à [This.GetName], qui tentaient toujours d'exécuter la tâche qui leur avait été assignée. Les machines étaient regroupées à un point central bloqué par des débris et des équipements démantelés. Le hub principal est hors ligne et pratiquement inutilisable, mais un signal émis à intervalles réguliers et provenant des profondeurs souterraines nous a donné une direction claire à suivre."
 ResourceDiscovery3: "Notre première analyse de [This.GetName] a révélé l'existence d'un centre de recherche de base situé autour d'un trou à la surface qui menait à une immense caverne souterraine. Le centre de recherche et ses machines étant totalement irrécupérables, nous nous sommes recentrés sur l'étude de la caverne."
 ResourceDiscovery4: "Après une étude exhaustive de la surface de [This.GetName], nous avons découvert une sonde qui effectuait un balayage intensif de la région. Quoi que nous fassions et quelles que soient nos tentatives d'interférence, la sonde revient inévitablement à cet endroit précis pour poursuivre ses opérations. En suivant son comportement, nous avons commencé à étudier le sol en dessous."
 ResourceDiscovery5: "Nous avons découvert une ancienne station minière ou de recherche en ruines à [This.GetName]. Il semble probable qu'elle se soit écrasée à la surface à un moment donné dans le passé. Elle présente également des signes d'attaque. Malgré les dégâts importants, la station continue d'émettre un signal sous terre. Avant de poursuivre notre route, nous devrions sans aucun doute mener une enquête plus approfondie."
