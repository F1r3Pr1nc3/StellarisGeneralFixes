l_russian:
 from_the_ashes_site_desc: "Поверхность мира [Planet.GetName] обжигающе горяча и враждебна для биологической жизни, однако [Owner.GetScientistPlural] обратили внимание на снимки явно искусственных руин. Археологическое изучение может пролить свет на то, кто здесь был и что с ними случилось."
 infernals.2700.desc: "Изначально руины в мире [From.Planet.GetName] казались каменными, но раскопки и анализ показали, что многие сооружения в этом затерянном городе состоят из окаменелого органического материала, сравнимого с древесиной. Сегодня ничего подобного на планете нет. Мелкие артефакты изготовлены из грубых металлов, стекла и схожих окаменелых органических материалов. Кроме того, [Owner.GetScientistPlural] нашли окаменевшие останки местных существ, которые давно вымерли.\n\nПохоже, эта цивилизация населяла планету, когда климат был гораздо более умеренным. Исчезли ли они задолго до того, как планета приняла нынешний облик, или же застали изменения в последние годы своего существования?"
