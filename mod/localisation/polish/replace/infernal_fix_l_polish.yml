l_polish:
 from_the_ashes_site_desc: "Powierzchnia planety [Planet.GetName] jest ekstremalnie gorąca i nieprzyjazna dla wszelkiego życia. Stąd też nasi [Owner.GetScientistPlural] od razu zwrócili uwagę na zarejestrowane tam obrazy ruin, które są wyraźnymi śladami cywilizacji. Być może badania archeologiczne pozwolą nam wyjaśnić, kim byli tutejsi budowniczowie i co się z nimi stało."
 infernals.2700.desc: "Choć ruiny na planecie [From.Planet.GetName] na pierwszy rzut oka wydawały się zbudowane z kamienia, to analizy przeprowadzone w toku wykopalisk wskazują raczej, że to miasto widmo zostało wzniesione ze skamieniałej materii organicznej porównywalnej do drewna. Do dziś na planecie nie zachowały się żadne źródła owego budulca. Znaleziono również drobne artefakty wykonane z surowych metali, szkła oraz podobnej skamieniałej materii. [Owner.GetScientistPlural] znaleźli również skamieniałe szczątki miejscowych form życia, które dawno temu wyginęły. \n\nZdaje się, że tutejsza cywilizacja zamieszkiwała planetę w czasach, gdy miejscowy klimat był dużo bardziej umiarkowany. Pytanie tylko, czy wymarła, zanim na planecie zapanowały obecne warunki czy też w swoich ostatnich latach istnienia jej przedstawiciele na własne oczy ujrzeli gwałtowne zmiany klimatu."
