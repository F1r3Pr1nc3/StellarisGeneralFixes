l_german:
 from_the_ashes_site_desc: "Die Oberfläche von [Planet.GetName] ist glühend heiß und unterstützt eigentlich kein biologisches Leben. Bilder von eindeutig künstlichen Ruinen zogen daher die Aufmerksamkeit unserer [Owner.GetScientistPlural] auf sich. Eine archäologische Ausgrabung könnte enthüllen, wie sie hierhergekommen sind und was mit ihnen passiert ist."
 infernals.2700.desc: "Ursprünglich gingen wir davon aus, dass die auf [From.Planet.GetName] gefundenen Ruinen aus Stein gebaut waren, doch eine Ausgrabung und eine weitere Analyse deuten nun darauf hin, dass viele der Strukturen dieser einst verlorenen Stadt aus versteinertem organischen Material bestehen, die eine Ähnlichkeit zu Holz aufweisen. Wir konnten keine Spuren dafür finden, dass ein solches Material heute noch irgendwo auf dme Planeten existiert. Kleinere Artefakte bestehen aus Rohmetallen, Glas und ähnlichen versteinerten organischen Stoffen, und unsere [Owner.GetScientistPlural] fanden auch Fossilien von heimischen Lebewesen, die heute ausgestorben sind.\n\nOffenbar wurde der Planet von einer Zivilisation bewohnt, als das Klima noch viel gemäßigter war. Wir wissen nicht, ob sie geflohen ist, bevor der Planet diesen Zustand annahm, oder ob sie in ihren letzten Jahren den gewaltsamen Wandel ihrer Welt miterlebte."
