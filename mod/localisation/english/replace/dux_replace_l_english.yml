l_english:
# This fixes indentation, corrects "Galactic Community" to "Galactic Community Emissary". Part of this fix was achieved in the trait itself by making it treat this tooltip as a modifier which skips localising part of it.
 leader_trait_supporting_voter_tt: "$t$- Support for a passed Resolution grants 1 §YFavor§! and 5 §YTrust§! with the proposing empire"


 observation.4.a.tt:0 "$regress_to_age_tt$"

# observation.1004.name:0 "Breakthrough on [pre_ftl_planet.GetName]!"
# Capitalisation.
 observation.1004.desc:0 "The scientist we first identified on [pre_ftl_planet.GetName] has developed into a remarkable talent. [abducted_scientist.GetHisHerCap] unconventional research and sharply analytical mind has rapidly accelerated the technological development of [pre_ftl_country.GetName]."

# neural not neutral.
 observation.1205.desc:1 "The [pre_ftl_country.GetSpeciesName] on [pre_ftl_planet.GetName] have conducted their own research into the neural implants we left behind. Somehow the [GetPreFTLLower] researchers have managed to engineer cybernetics far more compatible with [pre_ftl_country.GetSpeciesName] biology than we were capable of."

# prelude_to_war_planet not From.
 observation.3131.desc:1 "Our attempts to replace a key figure on [prelude_to_war_planet.GetName] with a body double from our own ranks has gone terribly wrong. Our agents were discovered, and those who weren't killed in the ensuing firefight committed suicide to avoid capture, as per instructions.\n\nThe leader they were sent to replace has blamed this incident on a rivaling nation. International tensions on the [prelude_to_war_planet.GetPlanetMoon] are growing and several nations have raised their military readiness levels. Our infiltration cells have prepared a global propaganda campaign to defuse the situation, but they will require a Science Ship in orbit to coordinate their efforts."

# Their not their.
 fircon.1291.desc:0 "Unfortunately, since the inhabitants of §Y[FromFromFrom.Owner.Capital.GetName]§! did not know who was responsible for their new star charts, they passed off our efforts as simple vandalism. Security around the caves has increased, and the ruling elite has grown hostile to new forms of self-expression...\n\nOn a positive note, our interference was not a complete waste of time. Their reaction to this event has proven fascinating in terms of cultural research."

# all research research projects
 preftl.2049.desc:0 "The swiftly changing circumstances on [Target.GetName] have made it impossible for us to continue monitoring the ongoing plague. For the time being, all research projects on the planet must be shelved."


# fircon.1330.name:0 "Art Finds a Way!"
# Swap planet for [pre_ftl_planet.GetPlanetHabitat]
 fircon.1330.desc:0 "Society on §Y[From.Owner.Capital.GetName]§! is blossoming with rich culture and a deep appreciation for art. The inhabitants are putting down their weapons in favor of writing instruments. With this newfound willingness to learn and explore beyond conflict, we could be witnessing the dawn of a golden age on the [pre_ftl_planet.GetPlanetHabitat]"

# fircon.1390.name:0 "Uncivil War"
# Swap planet for [pre_ftl_planet.GetPlanetHabitat]
 fircon.1390.desc:0 "In choosing to leave the world leaders of §Y[FromFrom.Owner.Capital.GetName]§! to their own devices, they are now wholly responsible for their destiny. Unfortunately, it appears they are headed for war.\n\nSupposedly irreconcilable differences have driven the [pre_ftl_planet.GetPlanetHabitat]'s culture groups to take up arms against one another. The coming conflict represents a dark period in their development."
 
# fircon.1395.name:0 "Catastrophe Averted"
# Swap planet for [pre_ftl_planet.GetPlanetHabitat]
 fircon.1395.desc:0 "The leaders of §Y[FromFromFrom.Owner.Capital.GetName]§! have taken our advice and put down their weapons. It is impossible to say if the peace will last, but for now at least, they are unlikely to wipe themselves from the face of their [pre_ftl_planet.GetPlanetHabitat]."

# fircon.1400.name:0 "Catastrophe"
# Swap planet for [pre_ftl_planet.GetPlanetHabitat]
 fircon.1400.desc:0 "Our intervention may have added fuel to the proverbial fire on §Y[FromFromFrom.Owner.Capital.GetName]§!. Their world is now at war. However, if they fail to eradicate one another, there may be an upside to the situation: the technological progress being made on the [pre_ftl_planet.GetPlanetHabitat] is remarkable.\n\nPerhaps, when and if the smoke of battle clears, they will put some of this technology to good use."

# fircon.1445.name:0 "Conflict! What is it Good For?"
# Swap planet for [pre_ftl_planet.GetPlanetHabitat]
 fircon.1445.desc:0 "A war has broken out on §Y[From.Owner.Capital.GetName]§!. In recent years, certain factions on the [pre_ftl_planet.GetPlanetHabitat] managed to accrue enough wealth to monopolize the means of production. In turn, others revolted against the growing inequality. Now, an all out class war has broken out. It is a dark time for §Y[From.Owner.Capital.GetName]§!. This will have lasting consequences."

# fircon.1455.name:0 "The Silent Resistance"
# Swap planet for [pre_ftl_planet.GetPlanetHabitat]
 fircon.1455.desc:0 "On §Y[FromFromFrom.Owner.Capital.GetName]§!, dissenting voices have been silenced by the powerful elite. However, if we intervene now we could certainly turn the tide. Our presence on the [pre_ftl_planet.GetPlanetHabitat] could bolster what is left of the resistance."

# fircon.2011.name:0 "It's Raining [pre_ftl_species.GetNamePlural]!"
# Swap avian for winged.
 fircon.2011.avian.desc:0 "$fircon.2011.base.desc$\n\nThe winged specimens we were trying to collect found the accident highly amusing. The bolder specimens even started chasing after our [GetIndividualNamePlural] in a bid to be lifted up too, just for the thrill."

# fircon.2525.name:0 "The Fires of Industry"
# Swap planet for world.
 fires_of_industry_desc:0 "This world has been heavily polluted during the local industrial revolution."

# fircon.2545.name:0 "Nascent Collective"
# Swap planet for [pre_ftl_planet.GetPlanetHabitat].
 fircon.2545.desc:0 "The proto hive that we have been observing on [pre_ftl_planet.GetName] has taken a significant step in its evolution. Over most of the [pre_ftl_planet.GetPlanetHabitat], small groups of individuals had started to organize in small-scale hives, but, while not fully autonomous, these drones were so far lacking the cohesion and coordination of a fully realized collective.\n\nThis has changed in the northern reaches of the [pre_ftl_planet.GetPlanetHabitat], where an individual appears to be the nexus for a singularity that is subjugating the nearby drones. This 'Drone-Prime' is currently traveling the [pre_ftl_planet.GetPlanetHabitat], and sending the subjugated drones to gather in a settlement of massive proportions given the low technological level of the world. There, the drones seem to be focused on building houses, silos, and expanding their food production as much as possible to accommodate the newcomers. Gone is the autonomy, for them, there is only the collective now."