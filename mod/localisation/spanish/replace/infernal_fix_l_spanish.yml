l_spanish:
 from_the_ashes_site_desc: "La superficie de [Planet.GetName] es abrasadora y un peligro para la vida biológica. Las imágenes de unas ruinas claramente artificiales han llamado la atención de los [Owner.GetScientistPlural]. Una investigación arqueológica podría revelar quiénes estuvieron aquí y qué fue de ellos."
 infernals.2700.desc: "Si bien las ruinas de [From.Planet.GetName] parecían inicialmente hechas de piedra, las excavaciones y los análisis sugieren que muchas de las estructuras de esta ciudad perdida están compuestas de un material orgánico petrificado comparable a la madera. Actualmente, no existe ninguna fuente de dichos materiales en el planeta. Los artefactos más pequeños se han fabricado con metales rudimentarios, vidrio y demás materiales orgánicos petrificados. A su vez, los [Owner.GetScientistPlural] han hallado fósiles de criaturas nativas ya extintas.\n\nSegún parece, la civilización de marras habitó el planeta en una época en la que su clima era mucho más templado. ¿Desaparecieron antes de que el planeta alcanzara su estado actual, o presenciaron la violenta transición en sus últimos años?"
